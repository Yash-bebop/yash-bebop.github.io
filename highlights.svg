<svg width="900" height="150" viewBox="0 0 900 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .lbl { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; fill: #0d1117; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #57606a; }
      .num { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 28px; font-weight: 700; fill: #0d6efd; letter-spacing: -1px; }
      .sec { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10.5px; font-weight: 700; fill: #0d1117; letter-spacing: 0.08em; }
    </style>
    <linearGradient id="aL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#3d8bfd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="150" rx="14" fill="#f0f6ff"/>

  <!-- Section label -->
  <circle cx="22" cy="20" r="4" fill="#0d6efd">
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="34" y="24" class="sec">HIGHLIGHTS</text>

  <!-- Divider line -->
  <line x1="20" y1="36" x2="880" y2="36" stroke="#dde7f5" stroke-width="1"/>

  <!-- ── Card 1: IMC ── -->
  <rect x="10" y="44" width="162" height="90" rx="10" fill="#fff" stroke="#dde7f5" stroke-width="1">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.1s" fill="freeze"/>
  </rect>
  <rect x="10" y="44" width="162" height="3" rx="1.5" fill="url(#aL)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.1s" fill="freeze"/>
  </rect>
  <text x="24" y="86" class="num">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
    Top 19%
  </text>
  <text x="24" y="104" class="lbl">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
    IMC Global Rank
  </text>
  <text x="24" y="119" class="sub">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
    18,809 teams · 117 countries
  </text>

  <!-- ── Card 2: PMx ── -->
  <rect x="182" y="44" width="162" height="90" rx="10" fill="#fff" stroke="#dde7f5" stroke-width="1">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.35s" fill="freeze"/>
  </rect>
  <rect x="182" y="44" width="162" height="3" rx="1.5" fill="url(#aL)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.35s" fill="freeze"/>
  </rect>
  <text x="196" y="86" class="num">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.45s" fill="freeze"/>
    Top 15
  </text>
  <text x="196" y="104" class="lbl">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.45s" fill="freeze"/>
    PMx · IIT Guwahati
  </text>
  <text x="196" y="119" class="sub">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.45s" fill="freeze"/>
    National Finalist 2026
  </text>

  <!-- ── Card 3: Students ── -->
  <rect x="354" y="44" width="162" height="90" rx="10" fill="#fff" stroke="#dde7f5" stroke-width="1">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.55s" fill="freeze"/>
  </rect>
  <rect x="354" y="44" width="162" height="3" rx="1.5" fill="url(#aL)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.55s" fill="freeze"/>
  </rect>
  <text x="368" y="86" class="num">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
    60+
  </text>
  <text x="368" y="104" class="lbl">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
    Students Taught
  </text>
  <text x="368" y="119" class="sub">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
    AI Instructor · 5+ countries
  </text>

  <!-- ── Card 4: CGPA ── -->
  <rect x="526" y="44" width="162" height="90" rx="10" fill="#fff" stroke="#dde7f5" stroke-width="1">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.75s" fill="freeze"/>
  </rect>
  <rect x="526" y="44" width="162" height="3" rx="1.5" fill="url(#aL)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.75s" fill="freeze"/>
  </rect>
  <text x="540" y="86" class="num">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.85s" fill="freeze"/>
    8.05
  </text>
  <text x="540" y="104" class="lbl">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.85s" fill="freeze"/>
    CGPA · Sem 1
  </text>
  <text x="540" y="119" class="sub">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.85s" fill="freeze"/>
    Doon University · CSE
  </text>

  <!-- ── Card 5: CUET ── -->
  <rect x="698" y="44" width="192" height="90" rx="10" fill="#fff" stroke="#dde7f5" stroke-width="1">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.95s" fill="freeze"/>
  </rect>
  <rect x="698" y="44" width="192" height="3" rx="1.5" fill="url(#aL)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.95s" fill="freeze"/>
  </rect>
  <text x="712" y="86" class="num">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.05s" fill="freeze"/>
    99.73
  </text>
  <text x="712" y="104" class="lbl">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.05s" fill="freeze"/>
    CUET Percentile
  </text>
  <text x="712" y="119" class="sub">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.05s" fill="freeze"/>
    General Aptitude · 2025
  </text>
</svg>
