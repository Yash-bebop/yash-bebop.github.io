<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .name { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 40px; font-weight: 700; letter-spacing: -1.5px; fill: #0d1117; }
      .sub  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; fill: #57606a; letter-spacing: 0.2px; }
      .pill { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 500; fill: #0d6efd; }
    </style>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#f0f6ff"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#3d8bfd"/>
    </linearGradient>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="0" fill="url(#hg)"/>

  <!-- Decorative circles top-right -->
  <circle cx="820" cy="50" r="60" fill="#0d6efd" opacity="0.04"/>
  <circle cx="860" cy="30" r="30" fill="#0d6efd" opacity="0.06"/>
  <circle cx="800" cy="90" r="18" fill="#0d6efd" opacity="0.08">
    <animate attributeName="r" values="18;24;18" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.14;0.08" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="845" cy="140" r="8" fill="#0d6efd" opacity="0.15">
    <animate attributeName="r" values="8;12;8" dur="5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="80" r="5" fill="#0d6efd" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot grid top-left -->
  <circle cx="30" cy="24" r="1.5" fill="#0d6efd" opacity="0.15"/>
  <circle cx="58" cy="24" r="1.5" fill="#0d6efd" opacity="0.15"/>
  <circle cx="86" cy="24" r="1.5" fill="#0d6efd" opacity="0.15"/>
  <circle cx="30" cy="50" r="1.5" fill="#0d6efd" opacity="0.12"/>
  <circle cx="58" cy="50" r="1.5" fill="#0d6efd" opacity="0.12"/>
  <circle cx="86" cy="50" r="1.5" fill="#0d6efd" opacity="0.12"/>

  <!-- Blue left accent bar -->
  <rect x="30" y="66" width="4" height="68" rx="2" fill="url(#bg)">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.1s" fill="freeze"/>
  </rect>

  <!-- Name -->
  <text x="46" y="108" class="name">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.25s" fill="freeze"/>
    Yashvardhan Dobhal
  </text>

  <!-- Blinking cursor -->
  <rect x="46" y="118" width="3" height="14" rx="1" fill="#0d6efd">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="46" y="144" class="sub">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.5s" fill="freeze"/>
    Agentic AI · Applied ML · Cybersecurity · Doon University, Dehradun
  </text>

  <!-- Pill badges -->
  <rect x="46" y="158" width="116" height="24" rx="12" fill="url(#pg)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.7s" fill="freeze"/>
  </rect>
  <text x="56" y="174" class="pill">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.7s" fill="freeze"/>
    ◆ Agentic AI
  </text>

  <rect x="170" y="158" width="134" height="24" rx="12" fill="url(#pg)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.85s" fill="freeze"/>
  </rect>
  <text x="180" y="174" class="pill">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.85s" fill="freeze"/>
    ◆ Google GSA 2026
  </text>

  <rect x="312" y="158" width="148" height="24" rx="12" fill="url(#pg)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
  </rect>
  <text x="322" y="174" class="pill">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
    ◆ B.Tech CSE '29
  </text>

  <rect x="468" y="158" width="172" height="24" rx="12" fill="url(#pg)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.15s" fill="freeze"/>
  </rect>
  <text x="478" y="174" class="pill">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.15s" fill="freeze"/>
    ◆ IMC Top 19% Global
  </text>
</svg>
