<svg width="900" height="188" viewBox="0 0 900 188" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .lbl { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #57606a; }
      .pct { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; fill: #0d6efd; font-weight: 600; }
      .sec { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10.5px; font-weight: 700; fill: #0d1117; letter-spacing: 0.08em; }
    </style>
    <linearGradient id="b1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#3d8bfd"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a58ca"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#4285f4"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#6ea8fe"/>
    </linearGradient>
    <linearGradient id="b5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#084298"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
  </defs>

  <rect width="900" height="188" rx="14" fill="#f0f6ff"/>

  <circle cx="22" cy="22" r="4" fill="#0d6efd">
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="34" y="26" class="sec">LANGUAGES</text>
  <line x1="20" y1="38" x2="880" y2="38" stroke="#dde7f5" stroke-width="1"/>

  <!-- Python -->
  <text x="20" y="64" class="lbl">Python</text>
  <rect x="110" y="54" width="740" height="12" rx="6" fill="#dde7f5"/>
  <rect x="110" y="54" width="0" height="12" rx="6" fill="url(#b1)">
    <animate attributeName="width" values="0;310" dur="1.2s" begin="0.2s" calcMode="spline" keySplines="0.22 1 0.36 1" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.2s" fill="freeze"/>
  </rect>
  <text x="858" y="64" class="pct">42%</text>

  <!-- TypeScript -->
  <text x="20" y="96" class="lbl">TypeScript</text>
  <rect x="110" y="86" width="740" height="12" rx="6" fill="#dde7f5"/>
  <rect x="110" y="86" width="0" height="12" rx="6" fill="url(#b2)">
    <animate attributeName="width" values="0;177" dur="1.2s" begin="0.4s" calcMode="spline" keySplines="0.22 1 0.36 1" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.4s" fill="freeze"/>
  </rect>
  <text x="858" y="96" class="pct">24%</text>

  <!-- JavaScript -->
  <text x="20" y="128" class="lbl">JavaScript</text>
  <rect x="110" y="118" width="740" height="12" rx="6" fill="#dde7f5"/>
  <rect x="110" y="118" width="0" height="12" rx="6" fill="url(#b3)">
    <animate attributeName="width" values="0;118" dur="1.2s" begin="0.6s" calcMode="spline" keySplines="0.22 1 0.36 1" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
  </rect>
  <text x="858" y="128" class="pct">16%</text>

  <!-- C -->
  <text x="20" y="160" class="lbl">C</text>
  <rect x="110" y="150" width="740" height="12" rx="6" fill="#dde7f5"/>
  <rect x="110" y="150" width="0" height="12" rx="6" fill="url(#b4)">
    <animate attributeName="width" values="0;74" dur="1.2s" begin="0.8s" calcMode="spline" keySplines="0.22 1 0.36 1" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
  </rect>
  <text x="858" y="160" class="pct">10%</text>

  <!-- Other -->
  <text x="20" y="180" class="lbl">Other</text>
  <rect x="110" y="170" width="740" height="12" rx="6" fill="#dde7f5"/>
  <rect x="110" y="170" width="0" height="12" rx="6" fill="url(#b5)">
    <animate attributeName="width" values="0;59" dur="1.2s" begin="1s" calcMode="spline" keySplines="0.22 1 0.36 1" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
  </rect>
  <text x="858" y="180" class="pct">8%</text>
</svg>
